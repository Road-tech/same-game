<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f6f8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Same Game</title>
  <meta name="description" content="Classic Same Game puzzle. Clear groups of adjacent same-color blocks for exponential score. 3 difficulties, undo." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='24' fill='%234a90d9'/%3E%3Crect x='36' y='36' width='44' height='44' rx='8' fill='%23ffffff'/%3E%3Crect x='106' y='36' width='44' height='44' rx='8' fill='%23ffffff'/%3E%3Crect x='36' y='106' width='44' height='44' rx='8' fill='%23ffffff'/%3E%3Crect x='106' y='106' width='44' height='44' rx='8' fill='%23ffffff'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="app-header">
    <!-- Row 1: Info (Title + Difficulty + Scores) -->
    <div class="header-row header-row-info">
      <div class="header-left">
        <h1 class="app-title" data-i18n="title">Same Game</h1>
        <p class="app-subtitle" data-i18n="subtitle">Click groups of same-color blocks to score</p>
      </div>

      <div class="header-info-right">
        <!-- Scores -->
        <div class="score-group">
          <div class="score-block">
            <span class="score-label" data-i18n="score">Score</span>
            <span class="score-value" id="score-value">0</span>
          </div>
          <div class="score-block">
            <span class="score-label" data-i18n="best">Best</span>
            <span class="score-value" id="best-value">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Row 2: Actions (Difficulty + Game + Meta) -->
    <div class="header-row header-row-actions">
      <!-- Difficulty toggle button -->
      <button id="difficulty-btn" class="btn btn-diff" data-i18n="easy">Easy</button>

      <!-- Game action buttons -->
      <div class="btn-group">
        <button id="undo-btn" class="btn btn-secondary" data-i18n="undo">
          <i class="fa-solid fa-undo"></i> <span data-i18n="undo">Undo</span>
        </button>
        <button id="new-btn" class="btn btn-primary" data-i18n="newGame">
          <i class="fa-solid fa-rotate-right"></i> <span data-i18n="newGame">New Game</span>
        </button>
      </div>

      <!-- Meta buttons (icon only) -->
      <div class="meta-group">
        <button id="theme-toggle" class="btn btn-secondary btn-icon" title="Toggle theme">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button id="sound-toggle" class="btn btn-secondary btn-icon" title="Toggle sound">
          <i class="fa-solid fa-bell"></i>
        </button>
        <button id="lang-toggle" class="btn btn-secondary btn-icon" title="Toggle language">
          <i class="fa-solid fa-language"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main class="app-main">
    <!-- Preview / hint bar -->
    <div class="status-bar">
      <span id="preview" class="preview-score"></span>
      <span id="hint" class="hint-text">Click groups of 2+ adjacent same-color blocks</span>
    </div>

    <!-- Game grid -->
    <div id="game-grid" class="game-grid"></div>
  </main>

  <!-- ── Game-over / cleared overlay ──────────────────────── -->
  <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="overlay-card">
      <h2 id="overlay-title" class="overlay-title"></h2>
      <p  id="overlay-msg"   class="overlay-msg"></p>
      <p  id="overlay-score" class="overlay-score"></p>
      <button id="overlay-play-btn" class="btn btn-primary btn-lg" data-i18n="playAgain">Play Again</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {
        // Silent fail
      });
    }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
